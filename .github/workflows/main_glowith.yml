name: Build and deploy Next.js app to Azure Web App - glowith

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts','**/*.tsx','**/*.css') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Typecheck
        run: npm run typecheck

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Build Next.js app
        env:
          DATABASE_URL: postgresql://glowith:glowith@localhost:5432/glowith
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXT_PUBLIC_APP_NAME: Glowith
          NEXT_PUBLIC_APP_URL: https://glowith.co.za
          NEXT_PUBLIC_API_URL: https://glowith.co.za/api
          NEXT_PUBLIC_DEFAULT_LOCALE: en-ZA
          NEXT_PUBLIC_DEFAULT_CURRENCY: ZAR
          NEXT_PUBLIC_DEFAULT_CURRENCY_SYMBOL: R
          NEXT_PUBLIC_DEFAULT_TIMEZONE: Africa/Johannesburg
          NEXT_PUBLIC_FEATURE_MARKETPLACE: 'true'
          NEXT_PUBLIC_FEATURE_PAYMENTS: 'true'
          NEXT_PUBLIC_FEATURE_CALENDAR_SYNC: 'true'
        run: npm run build

      - name: Assemble deployment package
        run: |
          mkdir -p /tmp/deploy

          # Standalone output already contains traced node_modules for the server —
          # this is the whole point of Next.js standalone mode. No full node_modules copy needed.
          cp -r .next/standalone/. /tmp/deploy
          mkdir -p /tmp/deploy/.next
          cp -r .next/static /tmp/deploy/.next/static
          cp -r public /tmp/deploy/public

          # Schema + migrations for prisma migrate deploy inside Azure
          cp prisma/schema.prisma /tmp/deploy/schema.prisma
          if [ -d prisma/migrations ]; then
            cp -r prisma/migrations /tmp/deploy/migrations
          fi

          # Add only the Prisma pieces not already in the standalone traced output.
          # Standalone already includes @prisma/client + the query-engine binary via tracing.
          # We only need to add:
          #   1. prisma CLI (JS only, ~5 MB) — for "prisma migrate deploy" in start.sh
          #   2. schema-engine binary — used by migrate deploy (NOT the query engine)
          #   3. .prisma/client override — ensure CI-generated client is used
          mkdir -p /tmp/deploy/node_modules/@prisma/engines
          cp -r node_modules/prisma                       /tmp/deploy/node_modules/prisma
          cp -r node_modules/@prisma/client               /tmp/deploy/node_modules/@prisma/client
          cp    node_modules/@prisma/engines/package.json /tmp/deploy/node_modules/@prisma/engines/
          # schema-engine is the migration binary in Prisma 5+
          find node_modules/@prisma/engines -maxdepth 1 -name "schema-engine-*" \
            -exec cp {} /tmp/deploy/node_modules/@prisma/engines/ \;
          cp -r node_modules/.prisma /tmp/deploy/node_modules/.prisma
          echo "=== Prisma engines dir size: $(du -sh /tmp/deploy/node_modules/@prisma/engines | cut -f1) ==="

          # Remove oryx-manifest.toml so Azure doesn't try to re-build on deploy
          rm -f /tmp/deploy/oryx-manifest.toml /tmp/deploy/node_modules.tar.gz

          # Minimal package.json (Azure needs it for the start command)
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            fs.writeFileSync('/tmp/deploy/package.json', JSON.stringify({
              name: 'glowith',
              version: pkg.version,
              engines: { node: '>=22.0.0' },
              scripts: { start: 'sh start.sh' }
            }, null, 2));
          "

          # Admin seed script
          cp scripts/seed-admin.js /tmp/deploy/seed-admin.js

          echo "=== .prisma/client present: $(ls /tmp/deploy/node_modules/.prisma/client/ | wc -l) files ==="

          # Startup: migrate (once) → seed (once) → start
          printf '%s\n' \
            '#!/bin/sh' \
            'SENTINEL=/home/site/wwwroot/.glowith_seeded' \
            '' \
            '# Run migrations only if migration files are newer than last run' \
            'MIGRATION_SENTINEL=/home/site/wwwroot/.glowith_migrated' \
            'SCHEMA_HASH=$(find migrations -name "*.sql" 2>/dev/null | sort | xargs md5sum 2>/dev/null | md5sum | cut -d" " -f1)' \
            'LAST_HASH=$(cat "$MIGRATION_SENTINEL" 2>/dev/null || echo "")' \
            '' \
            'if [ "$SCHEMA_HASH" != "$LAST_HASH" ]; then' \
            '  echo "Glowith startup — running database migrations..."' \
            '  node node_modules/prisma/build/index.js migrate deploy --schema=schema.prisma 2>/tmp/migrate_err' \
            '  MIGRATE_EXIT=$?' \
            '  if [ "$MIGRATE_EXIT" != "0" ]; then' \
            '    if grep -q "P3005" /tmp/migrate_err; then' \
            '      echo "Non-empty DB without migration history — baselining..."' \
            '      node node_modules/prisma/build/index.js migrate resolve --applied "20260520000000_baseline" --schema=schema.prisma || { echo "Baseline failed"; exit 1; }' \
            '      node node_modules/prisma/build/index.js migrate deploy --schema=schema.prisma || { echo "Post-baseline migration failed"; exit 1; }' \
            '    else' \
            '      cat /tmp/migrate_err >&2' \
            '      exit 1' \
            '    fi' \
            '  fi' \
            '  echo "$SCHEMA_HASH" > "$MIGRATION_SENTINEL"' \
            '  echo "Migrations complete."' \
            'else' \
            '  echo "No migration changes — skipping migrate deploy."' \
            'fi' \
            '' \
            '# Seed admin only once' \
            'if [ ! -f "$SENTINEL" ]; then' \
            '  echo "Seeding admin user..."' \
            '  node seed-admin.js && touch "$SENTINEL"' \
            'else' \
            '  echo "Admin already seeded — skipping."' \
            'fi' \
            '' \
            'echo "Starting Glowith..."' \
            'export HOSTNAME=0.0.0.0' \
            'export PORT="${PORT:-8080}"' \
            'exec node server.js' \
            > /tmp/deploy/start.sh
          chmod +x /tmp/deploy/start.sh

          cd /tmp/deploy
          zip -r /tmp/node-app.zip .
          echo "=== Zip size: $(du -sh /tmp/node-app.zip | cut -f1) ==="

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BF13B5F0AD114DF0B89E44F6F1189234 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F2DCFCD8872A47F2B2BC7609EA8EB5CE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_24724B3B0963430FA21F2D0F013F63AC }}

      - name: Deploy to Azure Web App
        # --async true returns as soon as the zip is accepted by Kudu (~upload time only).
        # App restart + migrations happen on Azure in the background — CI doesn't wait.
        run: |
          az webapp deploy \
            --resource-group glowith_rg \
            --name glowith \
            --src-path /tmp/node-app.zip \
            --type zip \
            --clean true \
            --async true

      - name: Clean up old workflow runs
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Keep the 10 most recent runs, delete everything older
          gh run list \
            --repo ${{ github.repository }} \
            --limit 100 \
            --json databaseId,status \
            --jq '.[] | select(.status == "completed") | .databaseId' \
          | tail -n +11 \
          | xargs -r -I {} gh run delete {} --repo ${{ github.repository }} 2>/dev/null || true
          echo "Cleanup complete."
