name: Build and deploy Next.js app to Azure Web App - glowith

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: .next/cache
          key: nextjs-v2-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts','**/*.tsx','**/*.css','prisma/schema.prisma') }}
          restore-keys: |
            nextjs-v2-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-
            nextjs-v2-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Typecheck
        run: npm run typecheck

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Build Next.js app
        env:
          DATABASE_URL: postgresql://glowith:glowith@localhost:5432/glowith
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXT_PUBLIC_APP_NAME: Glowith
          NEXT_PUBLIC_APP_URL: https://glowith.co.za
          NEXT_PUBLIC_API_URL: https://glowith.co.za/api
          NEXT_PUBLIC_DEFAULT_LOCALE: en-ZA
          NEXT_PUBLIC_DEFAULT_CURRENCY: ZAR
          NEXT_PUBLIC_DEFAULT_CURRENCY_SYMBOL: R
          NEXT_PUBLIC_DEFAULT_TIMEZONE: Africa/Johannesburg
          NEXT_PUBLIC_FEATURE_MARKETPLACE: 'true'
          NEXT_PUBLIC_FEATURE_PAYMENTS: 'true'
          NEXT_PUBLIC_FEATURE_CALENDAR_SYNC: 'true'
          SMTP2GO_API_KEY: ${{ secrets.SMTP2GO_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          WEBAUTHN_RP_ID: ${{ secrets.WEBAUTHN_RP_ID }}
          WEBAUTHN_RP_NAME: ${{ secrets.WEBAUTHN_RP_NAME }}
          WEBAUTHN_ORIGIN: ${{ secrets.WEBAUTHN_ORIGIN }}
        run: npm run build

      - name: Assemble deployment package
        run: |
          mkdir -p /tmp/deploy

          # Standalone output already contains traced node_modules for the server —
          # this is the whole point of Next.js standalone mode. No full node_modules copy needed.
          cp -r .next/standalone/. /tmp/deploy
          mkdir -p /tmp/deploy/.next
          cp -r .next/static /tmp/deploy/.next/static
          cp -r public /tmp/deploy/public

          # Schema + migrations for prisma migrate deploy inside Azure
          cp prisma/schema.prisma /tmp/deploy/schema.prisma
          if [ -d prisma/migrations ]; then
            cp -r prisma/migrations /tmp/deploy/migrations
          fi

          # Add only the Prisma pieces not already in the standalone traced output.
          # Standalone already includes @prisma/client + the query-engine binary via tracing.
          # We only need to add:
          #   1. prisma CLI (JS only, ~5 MB) — for "prisma migrate deploy" in start.sh
          #   2. schema-engine binary — used by migrate deploy (NOT the query engine)
          #   3. .prisma/client override — ensure CI-generated client is used
          # Prisma CLI + its JS dependency tree for migrate deploy.
          # Keep this explicit because standalone tracing does not include the CLI path.
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const srcRoot = path.resolve('node_modules');
          const destRoot = '/tmp/deploy/node_modules';
          const seen = new Set();

          function packageDir(name) {
            return path.join(srcRoot, ...name.split('/'));
          }

          function copyPackage(name) {
            if (seen.has(name)) return;
            seen.add(name);

            const src = packageDir(name);
            if (!fs.existsSync(src)) {
              throw new Error(`Missing package required for deploy: ${name}`);
            }

            const dest = path.join(destRoot, ...name.split('/'));
            fs.mkdirSync(path.dirname(dest), { recursive: true });
            fs.cpSync(src, dest, { recursive: true, force: true });

            const pkg = JSON.parse(fs.readFileSync(path.join(src, 'package.json'), 'utf8'));
            for (const dep of Object.keys(pkg.dependencies || {})) {
              copyPackage(dep);
            }
            for (const dep of Object.keys(pkg.optionalDependencies || {})) {
              if (fs.existsSync(packageDir(dep))) copyPackage(dep);
            }
          }

          for (const name of ['prisma', '@prisma/client', 'bcryptjs']) {
            copyPackage(name);
          }
          NODE

          # @prisma/engines: JS dist files (needed by Prisma CLI to resolve engine paths)
          # + only the schema-engine binary (for migrate deploy) — query engine is already
          # in the standalone traced node_modules
          rm -rf /tmp/deploy/node_modules/@prisma/engines
          mkdir -p /tmp/deploy/node_modules/@prisma/engines
          cp    node_modules/@prisma/engines/package.json   /tmp/deploy/node_modules/@prisma/engines/
          cp -r node_modules/@prisma/engines/dist           /tmp/deploy/node_modules/@prisma/engines/dist
          find node_modules/@prisma/engines -maxdepth 1 -name "schema-engine-*" \
            -exec cp {} /tmp/deploy/node_modules/@prisma/engines/ \;

          # Generated client (query engine binary for runtime)
          cp -r node_modules/.prisma /tmp/deploy/node_modules/.prisma
          echo "=== @prisma/engines size: $(du -sh /tmp/deploy/node_modules/@prisma/engines | cut -f1) ==="

          # Remove oryx-manifest.toml so Azure doesn't try to re-build on deploy
          rm -f /tmp/deploy/oryx-manifest.toml /tmp/deploy/node_modules.tar.gz

          # Minimal package.json (Azure needs it for the start command)
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            fs.writeFileSync('/tmp/deploy/package.json', JSON.stringify({
              name: 'glowith',
              version: pkg.version,
              engines: { node: '>=22.0.0' },
              scripts: { start: 'sh start.sh' }
            }, null, 2));
          "

          # Admin seed script
          cp scripts/seed-admin.js /tmp/deploy/seed-admin.js
          cp scripts/seed-demo-salon.js /tmp/deploy/seed-demo-salon.js

          echo "=== .prisma/client present: $(ls /tmp/deploy/node_modules/.prisma/client/ | wc -l) files ==="

          # Startup: migrate → seed (once) → start
          printf '%s\n' \
            '#!/bin/sh' \
            'SENTINEL=/home/site/wwwroot/.glowith_seeded' \
            '' \
            '# Regenerate Prisma Client from the deployed schema before the server starts.' \
            '# This prevents stale packaged clients from missing newly-added fields.' \
            'echo "Glowith startup — generating Prisma client..."' \
            'node node_modules/prisma/build/index.js generate --schema=schema.prisma || { echo "Prisma generate failed"; exit 1; }' \
            '' \
            '# Always run migrate deploy — it is idempotent and fast when up-to-date' \
            'echo "Glowith startup — running database migrations..."' \
            'node node_modules/prisma/build/index.js migrate deploy --schema=schema.prisma 2>/tmp/migrate_err' \
            'MIGRATE_EXIT=$?' \
            'if [ "$MIGRATE_EXIT" != "0" ]; then' \
            '  if grep -q "P3005" /tmp/migrate_err; then' \
            '    echo "Non-empty DB without migration history — baselining..."' \
            '    node node_modules/prisma/build/index.js migrate resolve --applied "20260520000000_baseline" --schema=schema.prisma || { echo "Baseline failed"; exit 1; }' \
            '    node node_modules/prisma/build/index.js migrate deploy --schema=schema.prisma || { echo "Post-baseline migration failed"; exit 1; }' \
            '  else' \
            '    cat /tmp/migrate_err >&2' \
            '    exit 1' \
            '  fi' \
            'fi' \
            'echo "Migrations complete."' \
            '' \
            '# Seed admin only once' \
            'if [ ! -f "$SENTINEL" ]; then' \
            '  echo "Seeding admin user..."' \
            '  node seed-admin.js && touch "$SENTINEL"' \
            'else' \
            '  echo "Admin already seeded — skipping."' \
            'fi' \
            '' \
            '# Optional demo salon seed for product walkthroughs and feature testing' \
            'if [ "$GLOWITH_SEED_DEMO_SALON" = "true" ]; then' \
            '  echo "Seeding demo salon..."' \
            '  node seed-demo-salon.js || { echo "Demo salon seed failed"; exit 1; }' \
            'else' \
            '  echo "Demo salon seed disabled — skipping."' \
            'fi' \
            '' \
            'echo "Starting Glowith..."' \
            'export HOSTNAME=0.0.0.0' \
            'export PORT="${PORT:-8080}"' \
            'exec node server.js' \
            > /tmp/deploy/start.sh
          chmod +x /tmp/deploy/start.sh

          cd /tmp/deploy
          zip -r /tmp/node-app.zip .
          echo "=== Zip size: $(du -sh /tmp/node-app.zip | cut -f1) ==="

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BF13B5F0AD114DF0B89E44F6F1189234 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F2DCFCD8872A47F2B2BC7609EA8EB5CE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_24724B3B0963430FA21F2D0F013F63AC }}

      - name: Deploy to Azure Web App
        # --track-status false keeps CI from waiting on Azure's startup probe.
        # App restart + migrations happen on Azure after the zip is accepted.
        run: |
          az webapp deploy \
            --resource-group glowith_rg \
            --name glowith \
            --src-path /tmp/node-app.zip \
            --type zip \
            --clean true \
            --async true \
            --track-status false

      - name: Clean up old workflow runs
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Keep the 10 most recent runs, delete everything older
          gh run list \
            --repo ${{ github.repository }} \
            --limit 100 \
            --json databaseId,status \
            --jq '.[] | select(.status == "completed") | .databaseId' \
          | tail -n +11 \
          | xargs -r -I {} gh run delete {} --repo ${{ github.repository }} 2>/dev/null || true
          echo "Cleanup complete."
