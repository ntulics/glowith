name: Build and deploy Next.js app to Azure Web App - glowith

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci --cache /tmp/npm-cache

      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Typecheck
        run: npm run typecheck

      - name: Security audit
        run: npm audit --audit-level=moderate

      - name: Build Next.js app
        env:
          DATABASE_URL: postgresql://glowith:glowith@localhost:5432/glowith
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXT_PUBLIC_APP_NAME: Glowith
          NEXT_PUBLIC_APP_URL: https://glowith.co.za
          NEXT_PUBLIC_API_URL: https://glowith.co.za/api
          NEXT_PUBLIC_DEFAULT_LOCALE: en-ZA
          NEXT_PUBLIC_DEFAULT_CURRENCY: ZAR
          NEXT_PUBLIC_DEFAULT_CURRENCY_SYMBOL: R
          NEXT_PUBLIC_DEFAULT_TIMEZONE: Africa/Johannesburg
          NEXT_PUBLIC_FEATURE_MARKETPLACE: 'true'
          NEXT_PUBLIC_FEATURE_PAYMENTS: 'true'
          NEXT_PUBLIC_FEATURE_CALENDAR_SYNC: 'true'
        run: npm run build

      - name: Assemble deployment package
        run: |
          mkdir -p /tmp/deploy

          # Next.js standalone output — traced server + production deps
          cp -r .next/standalone/. /tmp/deploy
          mkdir -p /tmp/deploy/.next
          cp -r .next/static /tmp/deploy/.next/static
          cp -r public /tmp/deploy/public

          # Schema + migrations so prisma migrate deploy can run inside Azure (VNet access)
          cp prisma/schema.prisma /tmp/deploy/schema.prisma
          if [ -d prisma/migrations ]; then
            cp -r prisma/migrations /tmp/deploy/migrations
          fi

          # Write package.json with start script.
          # Promote prisma CLI from devDependencies → dependencies so that
          # npm install --omit=dev below installs it (needed by start.sh migrate).
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = 'glowith';
            pkg.scripts = { start: 'sh start.sh' };
            pkg.engines = { node: '>=22.0.0' };
            pkg.dependencies['prisma'] = pkg.devDependencies['prisma'];
            delete pkg.devDependencies;
            fs.writeFileSync('/tmp/deploy/package.json', JSON.stringify(pkg, null, 2));
          "

          # Remove oryx-manifest.toml — Next.js standalone emits this file and
          # Azure Oryx uses it to extract a stale node_modules.tar.gz, overwriting
          # our freshly installed node_modules and dropping the Prisma CLI.
          rm -f /tmp/deploy/oryx-manifest.toml

          # Install production deps inside deploy dir.
          # With prisma now in dependencies, this pulls in prisma CLI + @prisma/engines
          # (the migration engine binary) automatically — no manual copying needed.
          cd /tmp/deploy
          PRISMA_SKIP_POSTINSTALL_GENERATE=1 npm install --omit=dev

          # Final cleanup — ensure no oryx artifacts make it into the zip
          rm -f /tmp/deploy/oryx-manifest.toml /tmp/deploy/node_modules.tar.gz

          # Override with the CI-generated Prisma client (built against this exact schema)
          cp -r $GITHUB_WORKSPACE/node_modules/.prisma /tmp/deploy/node_modules/.prisma

          # Admin seed script — reads ADMIN_EMAIL + ADMIN_PASSWORD from Azure App Settings
          cp $GITHUB_WORKSPACE/scripts/seed-admin.js /tmp/deploy/seed-admin.js

          echo "=== .prisma/client present: $(ls /tmp/deploy/node_modules/.prisma/client/ | wc -l) files ==="

          # Startup script: migrate → seed admin → start server
          # P3005 = existing DB with no migration history → baseline then re-run
          # Note: printf used instead of heredoc to avoid YAML << parse conflicts
          printf '%s\n' \
            '#!/bin/sh' \
            'echo "Glowith startup — running database migrations..."' \
            '' \
            'node node_modules/prisma/build/index.js migrate deploy --schema=schema.prisma 2>/tmp/migrate_err' \
            'MIGRATE_EXIT=$?' \
            '' \
            'if [ "$MIGRATE_EXIT" != "0" ]; then' \
            '  if grep -q "P3005" /tmp/migrate_err; then' \
            '    echo "Non-empty DB without migration history — baselining existing schema..."' \
            '    cat /tmp/migrate_err' \
            '    node node_modules/prisma/build/index.js migrate resolve --applied "20260520000000_baseline" --schema=schema.prisma || { echo "Baseline failed"; exit 1; }' \
            '    echo "Baseline complete. Re-running migrations..."' \
            '    node node_modules/prisma/build/index.js migrate deploy --schema=schema.prisma || { echo "Post-baseline migration failed"; exit 1; }' \
            '  else' \
            '    echo "Migration failed with unexpected error:"' \
            '    cat /tmp/migrate_err >&2' \
            '    exit 1' \
            '  fi' \
            'fi' \
            '' \
            'echo "Seeding admin user..."' \
            'node seed-admin.js' \
            '' \
            'echo "Database ready. Starting Glowith..."' \
            'export HOSTNAME=0.0.0.0' \
            'export PORT="${PORT:-8080}"' \
            'exec node server.js' \
            > /tmp/deploy/start.sh
          chmod +x /tmp/deploy/start.sh

          # Zip for fast OneDeploy upload
          cd /tmp/deploy
          zip -r /tmp/node-app.zip .
          echo "=== Zip size: $(du -sh /tmp/node-app.zip | cut -f1) ==="

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BF13B5F0AD114DF0B89E44F6F1189234 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F2DCFCD8872A47F2B2BC7609EA8EB5CE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_24724B3B0963430FA21F2D0F013F63AC }}

      - name: Set Azure startup command
        run: |
          az webapp config set \
            --resource-group glowith_rg \
            --name glowith \
            --startup-file 'sh start.sh'

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'glowith'
          slot-name: 'Production'
          package: /tmp/node-app.zip

      - name: Print startup logs
        if: always()
        continue-on-error: true
        run: |
          echo "Waiting 30s for app to boot..."
          sleep 30
          az webapp log tail \
            --resource-group glowith_rg \
            --name glowith \
            --timeout 20 2>&1 | tail -50
